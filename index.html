<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFXIV Characters</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script>
        (function () {
            try {
                var stored = localStorage.getItem('theme');
                if (stored === 'light' || stored === 'dark') {
                    document.documentElement.setAttribute('data-theme', stored);
                }
            } catch (e) {}
        })();
    </script>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="render.js"></script>
    <script type="module" src="theme.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme"></button>
            <h1>FFXIV Characters</h1>
        </header>

        <main>
            <div class="characters-grid">
                <!-- Character cards will be dynamically loaded from data.js -->
            </div>

            <!-- Social links will be dynamically loaded from config.js -->
            <section class="social-links" id="social-links-section"></section>
        </main>

        <footer>
            <p>Made by Mira wa Neko - <a href="https://github.com/mirawaneko/ffxiv-homepage" target="_blank" rel="noopener noreferrer">Github</a></p>
            <p class="trademark">FINAL FANTASY XIV &copy; SQUARE ENIX CO., LTD. All Rights Reserved.</p>
        </footer>
    </div>
</body>
</html>
